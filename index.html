<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>College Event Registration</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 16px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    h1 { color: #333; margin-bottom: 8px; font-size: 24px; }
    p.sub { color: #888; margin-bottom: 28px; font-size: 14px; }
    label { display: block; margin-bottom: 6px; color: #555; font-weight: 600; font-size: 14px; }
    input, select {
      width: 100%; padding: 12px 14px;
      border: 2px solid #e0e0e0; border-radius: 8px;
      font-size: 15px; margin-bottom: 20px;
      transition: border 0.2s;
    }
    input:focus, select:focus { border-color: #667eea; outline: none; }
    button {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white; border: none;
      border-radius: 8px; font-size: 16px;
      font-weight: 600; cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .success {
      display: none; margin-top: 20px;
      background: #e8f5e9; border: 1px solid #a5d6a7;
      color: #2e7d32; padding: 14px; border-radius: 8px;
      text-align: center; font-weight: 600;
    }
    .error {
      display: none; margin-top: 20px;
      background: #ffebee; border: 1px solid #ef9a9a;
      color: #c62828; padding: 14px; border-radius: 8px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎓 Event Registration</h1>
    <p class="sub">Register for upcoming college events</p>

    <label for="name">Full Name</label>
    <input type="text" id="name" placeholder="Enter your full name" required />

    <label for="event">Event Name</label>
    <select id="event">
      <option value="">-- Select an Event --</option>
      <option value="Tech Fest">Tech Fest</option>
      <option value="Cultural Event">Cultural Event</option>
      <option value="Workshop">Workshop</option>
    </select>

    <button id="submitBtn" onclick="submitForm()">Register Now</button>

    <div class="success" id="successMsg">
      ✅ Registration successful! See you at the event.
    </div>
    <div class="error" id="errorMsg">
      ❌ Something went wrong. Please try again.
    </div>
  </div>

  <script>
    async function submitForm() {
      const name = document.getElementById('name').value.trim();
      const event = document.getElementById('event').value;
      const btn = document.getElementById('submitBtn');
      const successMsg = document.getElementById('successMsg');
      const errorMsg = document.getElementById('errorMsg');

      successMsg.style.display = 'none';
      errorMsg.style.display = 'none';

      if (!name || !event) {
        errorMsg.textContent = '⚠️ Please fill in all fields.';
        errorMsg.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Registering...';

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, event })
        });

        const data = await res.json();
        if (res.ok) {
          successMsg.style.display = 'block';
          document.getElementById('name').value = '';
          document.getElementById('event').value = '';
        } else {
          throw new Error(data.error || 'Unknown error');
        }
      } catch (err) {
        errorMsg.textContent = '❌ ' + err.message;
        errorMsg.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Register Now';
      }
    }
  </script>
</body>
</html>
